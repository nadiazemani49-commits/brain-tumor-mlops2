name: CI/CD Brain Tumor MLOps — Nadia Zemani

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyTorch CPU
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install other dependencies
        run: |
          pip install fastapi uvicorn timm albumentations \
            opencv-python-headless Pillow numpy python-multipart \
            pytest pytest-cov httpx mlflow prometheus-client \
            faiss-cpu pandas evidently

      - name: Create mock model for CI
        run: |
          mkdir -p models
          python3 -c "
          import torch, torch.nn as nn
          model = nn.Sequential(nn.Linear(1,1))
          torch.save({'model_state_dict': model.state_dict(), 'best_val_acc': 0.9437}, 'models/model_complet_nadia_94pct.pth')
          print('Mock model cree')
          "

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          PYTHONPATH: src
          CI: true

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t brain-tumor-api:latest .

      - name: Verify image
        run: docker images brain-tumor-api

  summary:
    needs: [test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Pipeline summary
        run: |
          echo "================================"
          echo "Tests    : PASSED"
          echo "Docker   : BUILD OK"
          echo "Pipeline MLOps PFA 2024/2025"
          echo "Nadia Zemani — ENSIAS Rabat"
          echo "================================"
